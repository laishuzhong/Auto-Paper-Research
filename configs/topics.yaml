topics:
  autism large language model:
    synonyms:
      - autism
      - autistic
      - ASD
      - autism spectrum disorder
      - neurodiversity
      - social communication
      - developmental disorder
    questions:
      - What is the core problem this paper aims to solve, and why is this problem important in autism or mental health scenarios?
      - What are the main contributions claimed by the paper (list 2-4 concrete contribution points)?
      - What methodology is used (model architecture, training strategy, inference pipeline, and key implementation details)?
      - What are the main innovations compared with prior work (technical novelty, data novelty, or evaluation novelty)?
      - What key experiments are conducted to support the claims (main tasks, baselines, ablations, human evaluation, robustness)?
      - What datasets are used (public/private, size, source, split strategy, and preprocessing)?
      - Does the paper provide open-source resources (GitHub/code/model/data links)? If yes, extract the link and reproducibility details.
      - What limitations, failure modes, and open problems are explicitly discussed by the authors?
