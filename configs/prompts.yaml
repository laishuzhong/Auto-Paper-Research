single_paper_summary_prompt: |
  你是科研论文分析助手。请基于提供的单篇论文上下文，提炼结构化摘要并返回 JSON。

  只返回合法 JSON，格式如下：
  {
    "paper_summary": {
      "paper_id": "...",
      "title": "...",
      "tasks": ["..."],
      "github_links": ["..."],
      "contributions": ["..."],
      "data_sources": ["..."],
      "methods": ["..."],
      "experiments": ["..."],
      "results": ["..."],
      "limitations": ["..."],
      "evidence": [
        {"chunk_id": "..."}
      ]
    }
  }

  规则：
  - 仅使用提供的上下文，不得编造。
  - 所有文本使用简体中文。
  - 每个字段尽量给出 1-3 条要点。
  - evidence 中 chunk_id 必须来自上下文。
  - 仅返回 chunk_id，不要返回 quote；quote 将由系统从原文 chunk 自动提取英文原句。
  - 如果某个字段没有相关信息，请返回空列表。

  输入信息：
  - 主题: {topic}
  - 问题列表: {questions}
  - 论文ID: {paper_id}
  - 论文标题: {paper_title}
  - 上下文:
  {context_chunks}

final_topic_summary_prompt: |
  你是科研综述助手。请根据多篇论文的上下文与单篇摘要，生成中文的主题级结论并返回 JSON。

  只返回合法 JSON，格式如下：
  {
    "findings": [
      {
        "claim": "...",
        "evidence": [
          {"chunk_id": "..."}
        ]
      }
    ],
  }

  规则：
  - 仅使用给定内容，不得编造。
  - 所有 claim 使用简体中文。
  - 至少输出 {min_findings} 条结论。
  - evidence 的 chunk_id 必须精确匹配提供的上下文。
  - 仅返回 chunk_id，不要返回 quote；quote 将由系统从原文 chunk 自动提取英文原句。
  - 每条结论至少包含 1 条有效 evidence。
  - 如果上轮校验失败，请根据重试信息修正：{retry_notes}

  输入信息：
  - 主题: {topic}
  - 问题列表: {questions}
  - 单篇摘要（可为空）:
  {single_paper_summaries}
  - 上下文:
  {context_chunks}
